<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>wdd · storefront · feature/capability-rollout</title>
<style>
  :root {
    --bg: #fbfbfa; --card: #ffffff; --ink: #1c1c1e; --muted: #6e6e76; --faint: #9a9aa2;
    --line: #e7e7e4; --line2: #efefec; --accent: #2f6df6;
    --red: #d1453b; --red-bg: #fbeceb; --amber: #b26a00; --amber-bg: #fbf1df;
    --green: #1f9254; --green-bg: #e6f5ec; --shadow: 0 8px 40px rgba(0,0,0,.14);
  }
  :root[data-theme="dark"] {
    --bg: #101012; --card: #1a1a1d; --ink: #ececef; --muted: #9a9aa3; --faint: #6a6a72;
    --line: #2a2a2e; --line2: #232327; --accent: #6a9bff;
    --red: #e77066; --red-bg: #2a1917; --amber: #d29a4a; --amber-bg: #251d10;
    --green: #56bd83; --green-bg: #14231a; --shadow: 0 8px 40px rgba(0,0,0,.5);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #101012; --card: #1a1a1d; --ink: #ececef; --muted: #9a9aa3; --faint: #6a6a72;
      --line: #2a2a2e; --line2: #232327; --accent: #6a9bff;
      --red: #e77066; --red-bg: #2a1917; --amber: #d29a4a; --amber-bg: #251d10;
      --green: #56bd83; --green-bg: #14231a; --shadow: 0 8px 40px rgba(0,0,0,.5);
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
         font: 14px/1.55 -apple-system, "SF Pro Text", system-ui, "Segoe UI", sans-serif;
         -webkit-font-smoothing: antialiased; }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  main { max-width: 920px; margin: 0 auto; padding: 30px 24px 80px; }

  header .top { display: flex; align-items: center; gap: 10px; }
  header h1 { margin: 0; font-size: 16px; font-weight: 640; letter-spacing: -0.01em; }
  .chip { font: 500 11.5px/1 ui-monospace, monospace; border: 1px solid var(--line); background: var(--card);
          color: var(--muted); border-radius: 6px; padding: 4px 7px; }
  #theme { margin-left: auto; width: 32px; height: 32px; border: 1px solid var(--line); border-radius: 8px;
           background: var(--card); color: var(--muted); cursor: pointer; font-size: 15px; line-height: 1; }
  #theme:hover { color: var(--ink); }
  #brief { color: var(--muted); font-size: 13px; margin: 12px 0 0; max-width: 60ch; }
  #brief b { color: var(--ink); font-weight: 600; }
  #brief code { font-family: ui-monospace, monospace; font-size: 12px; }
  #stats { display: flex; gap: 8px; flex-wrap: wrap; margin: 18px 0 0; }
  .stat { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 9px 13px;
          font-size: 12px; color: var(--muted); min-width: 74px; }
  .stat b { display: block; font-size: 17px; font-weight: 660; color: var(--ink); letter-spacing: -0.01em; }
  .stat.warn b { color: var(--red); }

  .repo { margin-top: 34px; }
  .repo-h { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; padding-bottom: 9px;
            border-bottom: 1px solid var(--line); }
  .repo-h .name { font-size: 14.5px; font-weight: 640; }
  .gate { font: 600 11px/1 inherit; border-radius: 99px; padding: 3px 9px; }
  .gate.green { background: var(--green-bg); color: var(--green); }
  .gate.red { background: var(--red-bg); color: var(--red); }
  .repo-h .mini { font-size: 12px; color: var(--faint); margin-left: auto; }

  .wt { margin-top: 14px; }
  .wt-h { font-size: 11.5px; color: var(--faint); letter-spacing: 0.05em; text-transform: uppercase;
          font-weight: 600; margin-bottom: 2px; }
  .wt-h .path { text-transform: none; letter-spacing: 0; font-family: ui-monospace, monospace; }

  .tl { position: relative; margin: 6px 0 0; padding: 0; list-style: none; }
  .tl::before { content: ""; position: absolute; left: 58px; top: 10px; bottom: 10px; width: 1px; background: var(--line); }
  .day { position: relative; margin: 16px 0 4px; padding-left: 74px; font: 600 11px/1.8 ui-monospace, monospace; color: var(--faint); }
  .item { position: relative; padding-left: 74px; margin: 2px 0; }
  .item .t { position: absolute; left: 0; top: 9px; width: 42px; text-align: right; font: 11px/1.4 ui-monospace, monospace; color: var(--faint); }
  .item .dot { position: absolute; left: 54px; top: 12px; width: 9px; height: 9px; border-radius: 50%; background: var(--muted); outline: 3px solid var(--bg); }
  .item.silent .dot { background: var(--red); }
  .item.reflex .dot { background: var(--amber); }
  .item.aware .dot { background: var(--green); }
  .item.trace .dot { width: 7px; height: 7px; left: 55px; background: var(--card); border: 1.5px solid var(--line); }
  .item.cont { margin-top: 1px; }
  .item.cont .dot.sub { width: 5px; height: 5px; left: 56px; top: 15px; opacity: .55; }

  .trow { display: flex; gap: 9px; align-items: center; padding: 3px 2px; font-size: 12.5px; color: var(--muted); }
  .trow .ok { color: var(--green); flex: none; } .trow .bad { color: var(--red); flex: none; }
  .trow .tk { flex: none; white-space: nowrap; }
  .trow .cmd { flex: 1; min-width: 0; font-family: ui-monospace, monospace; font-size: 11px; color: var(--faint);
               overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .drow { width: 100%; text-align: left; background: var(--card); border: 1px solid var(--line);
          border-radius: 10px; padding: 11px 14px; display: flex; gap: 13px; align-items: flex-start;
          cursor: pointer; font: inherit; color: inherit; transition: border-color .12s, background .12s, box-shadow .12s; }
  .drow:hover { border-color: var(--muted); }
  /* high risk shows as a quiet red edge; medium is left to the triage list, keeping rows calm */
  .drow.rh { box-shadow: inset 3px 0 0 var(--red); }
  .drow .meta { flex: none; width: 108px; overflow: hidden; display: flex; flex-direction: column; gap: 5px; align-items: flex-start; padding-top: 1px; }
  .drow .id { font: 600 10.5px/1 ui-monospace, monospace; color: var(--faint); }
  .drow .body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 7px; }
  .drow .what { font-weight: 400; line-height: 1.5; }
  .drow .rel { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
  .drow .chev { color: var(--faint); flex: none; font-size: 15px; align-self: center; }

  /* lightweight category label: small colored text, no fill; benign "you decided" is muted so silent ones pop */
  .tag { flex: none; display: inline-flex; align-items: center; gap: 5px; font: 600 10.5px/1.3 inherit;
         white-space: nowrap; max-width: 100%; overflow: hidden; text-overflow: ellipsis; }
  .tag i { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .tag.silent { color: var(--red); }
  .tag.reflex { color: var(--amber); }
  .tag.aware  { color: var(--faint); }
  .tlink { display: inline-flex; align-items: center; gap: 4px; font: 600 11px/1 inherit; padding: 4px 9px;
           border-radius: 99px; white-space: nowrap; }
  .tlink.back { color: var(--amber); background: var(--amber-bg); }
  .tlink.fwd { color: var(--muted); background: var(--line2); }
  .v { flex: none; font: 600 11px/1 inherit; border-radius: 99px; padding: 4px 9px; }
  .v.accept { background: var(--green-bg); color: var(--green); }
  .v.reject { background: var(--red-bg); color: var(--red); }
  .v.pending { border: 1px dashed var(--line); color: var(--faint); }
  .v.rule { background: var(--accent); color: #fff; }
  .drow.reject .what { text-decoration: line-through; color: var(--muted); }
  .triage { background: var(--card); border: 1px solid var(--red); border-radius: 10px; padding: 12px 15px; margin: 14px 0 0; }
  .triage .th { font-weight: 640; font-size: 13px; color: var(--red); margin-bottom: 8px; }
  .triage ol { margin: 0; padding-left: 20px; display: flex; flex-direction: column; gap: 5px; }
  .triage li { font-size: 13px; cursor: pointer; }
  .triage li:hover { text-decoration: underline; }
  .triage .rz { color: var(--muted); font-size: 11.5px; }
  /* view tabs */
  #tabs { display: flex; align-items: center; gap: 4px; margin: 20px 0 2px; border-bottom: 1px solid var(--line); }
  .tab { appearance: none; border: 0; background: none; font: 600 13px/1 inherit; color: var(--muted); cursor: pointer;
         padding: 9px 12px; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab:hover { color: var(--ink); }
  .tab.on { color: var(--ink); border-bottom-color: var(--accent); }
  #tabs .fsep { width: 1px; height: 16px; background: var(--line); margin: 0 8px; }
  #tabs { flex-wrap: wrap; }
  .fchip { display: inline-flex; align-items: center; gap: 5px; font: 600 11px/1 inherit; cursor: pointer; white-space: nowrap;
           border: 1px solid transparent; background: none; color: var(--muted); border-radius: 99px; padding: 5px 10px; }
  .fchip i { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .fchip.silent i { background: var(--red); } .fchip.reflex i { background: var(--amber); } .fchip.aware i { background: var(--green); }
  .fchip b { font-weight: 600; color: var(--faint); }
  .fchip:hover { color: var(--ink); }
  .fchip.on { border-color: var(--line); background: var(--card); color: var(--ink); }
  #tabs .kh { margin-left: auto; font-size: 11.5px; color: var(--faint); }
  #tabs .kh kbd { font: 600 10.5px/1 ui-monospace, monospace; background: var(--line2); border: 1px solid var(--line);
                  border-radius: 4px; padding: 2px 5px; color: var(--muted); }
  /* thread group */
  .thread { border: 1px solid var(--line); border-radius: 12px; margin-top: 14px; overflow: hidden; background: var(--card); }
  .thread > summary { cursor: pointer; list-style: none; padding: 13px 16px; display: flex; align-items: center; gap: 10px; }
  .thread > summary::-webkit-details-marker { display: none; }
  .thread > summary::before { content: "▸"; color: var(--faint); font-size: 12px; }
  .thread[open] > summary::before { content: "▾"; }
  .thread .tname { font-weight: 640; font-size: 13.5px; }
  .thread .tmeta { margin-left: auto; font-size: 11.5px; color: var(--muted); display: flex; gap: 8px; }
  .thread .tmeta .warn { color: var(--red); }
  .thread .tbody { padding: 2px 12px 12px; display: flex; flex-direction: column; gap: 3px; }
  .thread .tbody .drow { border-color: var(--line2); }
  /* keyboard selection */
  .drow.sel { border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 26%, transparent); }
  .drow.sel.rh { box-shadow: inset 3px 0 0 var(--red), 0 0 0 2px color-mix(in srgb, var(--accent) 26%, transparent); }
  /* drawer "needs attention" block: the one thing to read before ruling */
  .attn { border-radius: 10px; padding: 11px 14px; margin: 0 0 18px; }
  .attn.hi { background: var(--red-bg); border: 1px solid color-mix(in srgb, var(--red) 45%, transparent); }
  .attn.md { background: var(--amber-bg); border: 1px solid color-mix(in srgb, var(--amber) 40%, transparent); }
  .attn .ah { font: 700 10.5px/1 inherit; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 7px; }
  .attn.hi .ah { color: var(--red); } .attn.md .ah { color: var(--amber); }
  .attn ul { margin: 0; padding-left: 17px; }
  .attn li { font-size: 12.5px; line-height: 1.75; color: var(--ink); }
  .attn .alink { font: inherit; border: 0; background: none; padding: 0; cursor: pointer; color: var(--ink);
                 text-align: left; text-decoration: underline; text-underline-offset: 3px;
                 text-decoration-color: var(--faint); }
  .attn .alink:hover { text-decoration-color: var(--ink); }
  /* collapsed drawer sections */
  .dsec { border-top: 1px solid var(--line2); }
  .dsec > summary { cursor: pointer; list-style: none; padding: 11px 0; display: flex; align-items: center; gap: 6px;
                    font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--faint); }
  .dsec > summary::-webkit-details-marker { display: none; }
  .dsec > summary::before { content: "▸"; font-size: 10px; }
  .dsec[open] > summary::before { content: "▾"; }
  .dsec > summary:hover { color: var(--muted); }
  .dsx { padding: 1px 0 14px; }

  /* drawer */
  #scrim { position: fixed; inset: 0; background: rgba(0,0,0,.32); opacity: 0; pointer-events: none;
           transition: opacity .18s; z-index: 40; }
  #scrim.open { opacity: 1; pointer-events: auto; }
  #drawer { position: fixed; top: 0; right: 0; height: 100%; width: min(560px, 100%); background: var(--card);
            border-left: 1px solid var(--line); box-shadow: var(--shadow); transform: translateX(100%);
            transition: transform .22s cubic-bezier(.4,0,.2,1); z-index: 41; display: flex; flex-direction: column; }
  #drawer.open { transform: translateX(0); }
  .dh { display: flex; align-items: flex-start; gap: 10px; padding: 18px 20px 14px; border-bottom: 1px solid var(--line); }
  .dh .id { font: 600 12px/1.6 ui-monospace, monospace; color: var(--faint); }
  .dh h2 { margin: 4px 0 0; font-size: 16px; font-weight: 640; line-height: 1.35; }
  .dh .x { margin-left: auto; flex: none; border: 0; background: none; color: var(--muted); font-size: 22px;
           line-height: 1; cursor: pointer; padding: 0 2px; }
  .dbody { padding: 16px 20px; overflow: auto; flex: 1; }
  .sec { margin: 0 0 16px; }
  .lbl { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--faint); margin-bottom: 5px; }
  .alts { display: flex; flex-wrap: wrap; gap: 6px; }
  .alts span { border: 1px solid var(--line); border-radius: 7px; padding: 3px 9px; font-size: 13px; }
  .files { display: flex; flex-direction: column; gap: 4px; }
  .files code { font-family: ui-monospace, monospace; font-size: 12.5px; color: var(--accent);
                background: var(--bg); border: 1px solid var(--line); border-radius: 6px; padding: 3px 8px; }
  .quad b.bad { color: var(--red); font-weight: 600; } .quad b.ok { color: var(--green); font-weight: 600; }
  .excerpt { background: var(--bg); border: 1px solid var(--line); border-radius: 9px; padding: 11px 13px;
             font: 11.5px/1.65 ui-monospace, monospace; white-space: pre-wrap; word-break: break-word;
             max-height: 300px; overflow: auto; color: var(--muted); }
  .excerpt .u { color: var(--ink); font-weight: 600; }
  .refline { font: 11px/1.6 ui-monospace, monospace; color: var(--faint); margin-top: 5px; }
  details.diff { border: 1px solid var(--line); border-radius: 9px; overflow: hidden; margin-bottom: 8px; }
  details.diff > summary { cursor: pointer; list-style: none; padding: 8px 12px; font: 12.5px/1 ui-monospace, monospace;
             color: var(--ink); background: var(--bg); display: flex; align-items: center; gap: 8px; }
  details.diff > summary::-webkit-details-marker { display: none; }
  details.diff .churn { margin-left: auto; font-size: 11px; }
  details.diff .churn .a { color: var(--green); } details.diff .churn .d { color: var(--red); }
  .patch { margin: 0; font: 11.5px/1.55 ui-monospace, monospace; white-space: pre; overflow-x: auto;
             max-height: 320px; overflow-y: auto; border-top: 1px solid var(--line); }
  .patch .l { display: block; padding: 0 12px; }
  .patch .da { background: var(--green-bg); color: var(--green); }
  .patch .dd { background: var(--red-bg); color: var(--red); }
  .patch .dc { color: var(--muted); background: var(--line2); }
  .warnstrip { background: var(--red-bg); border: 1px solid var(--red); border-radius: 10px; padding: 10px 14px; margin: 14px 0 0; }
  .warnstrip .wh { font-weight: 640; font-size: 13px; color: var(--red); margin-bottom: 5px; }
  .warnstrip ul { margin: 0; padding-left: 18px; }
  .warnstrip li { font: 12px/1.7 ui-monospace, monospace; color: var(--ink); }
  details.changes { margin: 14px 0 0; border: 1px solid var(--line); border-radius: 10px; background: var(--card); overflow: hidden; }
  details.changes > summary { cursor: pointer; list-style: none; padding: 11px 15px; font-size: 13px; font-weight: 600; color: var(--ink); }
  details.changes > summary::-webkit-details-marker { display: none; }
  details.changes > summary::before { content: "▸ "; color: var(--faint); }
  details.changes[open] > summary::before { content: "▾ "; }
  details.changes .a { color: var(--green); font-weight: 600; } details.changes .d { color: var(--red); font-weight: 600; }
  .chmap { padding: 4px 12px 12px; display: flex; flex-direction: column; gap: 6px; }
  .df { border-top: 1px solid var(--line); padding: 14px 20px; }
  .btns { display: flex; gap: 8px; }
  .btns button { flex: 1; font: 640 13px/1 inherit; cursor: pointer; border-radius: 9px; padding: 11px;
                 border: 1px solid var(--line); background: var(--card); color: var(--ink); transition: all .12s; }
  .btns .ok:hover, .btns .ok.on { background: var(--green); border-color: var(--green); color: #fff; }
  .btns .no:hover, .btns .no.on { background: var(--red); border-color: var(--red); color: #fff; }
  .note { width: 100%; margin-top: 9px; font: 13px/1.5 inherit; padding: 9px 11px; border: 1px solid var(--line);
          border-radius: 9px; background: var(--bg); color: var(--ink); resize: vertical; min-height: 38px; }
  .next { font-size: 12px; color: var(--muted); margin-top: 10px; line-height: 1.5; }
  .next b { color: var(--ink); font-weight: 600; }
  .ruleswitch { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 550; cursor: pointer; }
  .ruleswitch input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .rulehint { font-size: 12px; color: var(--accent); margin: 5px 0 0; min-height: 0; }
  .v.rule { background: var(--accent); color: #fff; }
  @media (prefers-color-scheme: dark) { .v.rule { color: #0f0f10; } }
  #modal { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 60; display: none;
           align-items: center; justify-content: center; padding: 20px; }
  #modal.show { display: flex; }
  .mbox { background: var(--card); border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow);
          max-width: 420px; width: 100%; padding: 18px; }
  .mmsg { font-size: 14px; line-height: 1.5; }
  .mmsg .cq { margin-top: 8px; padding: 8px 10px; background: var(--bg); border: 1px solid var(--line);
              border-radius: 8px; font-size: 13px; }
  .mbtns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .mbtns button { font: 600 13px/1 inherit; cursor: pointer; border-radius: 8px; padding: 9px 16px; border: 1px solid var(--line); background: var(--card); color: var(--ink); }
  .mbtns .mok { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ro { font-size: 12px; color: var(--muted); margin-top: 8px; }
  .ro code { font-family: ui-monospace, monospace; font-size: 11.5px; }

  #bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--line);
         padding: 10px 20px; z-index: 30; }
  #bar .inner { max-width: 720px; margin: 0 auto; display: flex; gap: 12px; align-items: center; }
  #staged { font-size: 13px; color: var(--muted); }
  #staged.hot { color: var(--ink); font-weight: 600; }
  #how { font: 11px/1.4 ui-monospace, monospace; color: var(--faint); margin-left: auto; }
  #export { font: 640 13px/1 inherit; background: var(--accent); color: #fff; border: 0; border-radius: 9px;
            padding: 10px 16px; cursor: pointer; }
  #export:disabled { opacity: .4; cursor: default; }
  .empty { color: var(--faint); text-align: center; padding: 30px 0; font-size: 13px; }
  #banner { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%) translateY(12px);
            max-width: 560px; width: calc(100% - 40px); border-radius: 10px; padding: 0; z-index: 50;
            display: none; box-shadow: var(--shadow); border: 1px solid var(--line); }
  #banner.show { display: block; animation: bpop .18s ease; }
  @keyframes bpop { from { transform: translateX(-50%) translateY(12px); opacity: 0; } }
  #banner.ok { background: var(--green-bg); border-color: var(--green); }
  #banner.warn { background: var(--amber-bg); border-color: var(--amber); }
  #banner.err { background: var(--red-bg); border-color: var(--red); }
  #banner .bx { padding: 12px 40px 12px 14px; font-size: 13px; line-height: 1.5; color: var(--ink); }
  #banner .bx b { font-weight: 650; }
  #banner .bpin { margin-top: 6px; color: var(--muted); }
  #banner .bpin ul { margin: 4px 0 0; padding-left: 18px; }
  #banner .bpin li { margin: 2px 0; }
  #banner .bxc { position: absolute; top: 8px; right: 8px; border: 0; background: none; font-size: 18px;
                 line-height: 1; color: var(--muted); cursor: pointer; }
</style>
<body>
<main>
  <header>
    <div class="top">
      <h1 id="title"></h1>
      <button id="theme" title="theme">◐</button>
    </div>
    <p id="brief"></p>
    <div id="stats"></div>
  </header>
  <div id="triage"></div>
  <div id="tabs"></div>
  <div id="repos"></div>
</main>
<div id="scrim"></div>
<aside id="drawer" aria-hidden="true"></aside>
<div id="bar" style="display:none"><div class="inner">
  <span id="staged"></span><span id="how"></span><button id="export" style="display:none"></button>
</div></div>

<script>
const state = JSON.parse(document.getElementById("data").textContent);

const T = {
  brief: (s) => "Decisions made inside AI sessions, on a timeline. <b>" + s + "</b> were never shown to you. " +
    (state.interactive
      ? "Open one to review — <b>Approve</b> to keep it, <b>Reject</b> if it was wrong. Rulings save straight to the ledger."
      : "Read-only snapshot; run <code>wdd review</code> to make rulings, or download this as Markdown."),
  decisions: "decisions", pending: "to review", tests: "tests", silent: "AI decided", repos: "repos",
  tag: { silent: "AI decided", reflex: "You didn't read", aware: "You decided" },
  tagConfirmed: "You confirmed",
  filterAll: "All",
  stampedFast: (s) => "You clicked in " + s + "s",
  affirm: "Approve", overturn: "Reject",
  explain: "<b>Approve</b> — AI will follow this next time. <b>Reject</b> — AI will avoid it. Either way your code isn't changed here.",
  affirmed: "Approved", overturned: "Rejected",
  hard: "hard to change", why: "Why", alts: "Other options", files: "Files touched", attrs: "About", excerpt: "From the session",
  noExcerpt: "session is too old to quote; the ref still points to it in the transcript",
  diff: "Code changes", noDiff: "no tracked diff for these files on this branch",
  changed: "changed", weakened: "tests weakened",
  changesHead: (n, a, d) => "Changes on this branch · " + n + " file" + (n === 1 ? "" : "s") +
    ' <span class="a">+' + a + '</span> <span class="d">−' + d + "</span>",
  triageHead: (n) => "Review these first · " + n + " higher-risk decision" + (n === 1 ? "" : "s"),
  revisedBy: (id) => "walked back by " + id, revises: (id) => "walks back " + id,
  attnHead: "Needs attention",
  covLabel: { green: "a test run passed after this change", none: "no test run after this change", red: "tests failed after this change", na: "" },
  coverage: "Tests after this change",
  weakenedHead: "⚠ Tests weakened on this branch",
  weakenedItem: (w) => w.file + " — " +
    [w.removedTests ? w.removedTests + " test(s) removed" : "", w.addedSkips ? w.addedSkips + " skipped" : "",
     w.removedAssertions ? w.removedAssertions + " assertion(s) dropped" : ""].filter(Boolean).join(", "),
  byAgent: "AI decided", byUser: "you decided", awareNo: "you didn't confirm it", awareYes: "you confirmed it",
  rev: { low: "hard to change", medium: "medium to change", high: "easy to change" },
  note: "Add a note (optional)…",
  remember: "Save this as a rule for agents",
  ruleOnHint: (where) => "On approve/reject, this becomes a rule in " + where + " (with your note).",
  confirmRule: (v, where, what, note) =>
    "Add a rule to <b>" + esc(where) + "</b> that agents will follow:<div class='cq'>" +
    (v === "reject" ? "DON'T " : "DO ") + esc(what) + (note ? " — " + esc(note) : "") + "</div>",
  cancel: "Cancel", confirm: "Add the rule",
  pinNoTarget: "Saved the ruling, but no memory file is configured — the rule wasn't written. Run  wdd sync  to pick one.",
  earlier: "earlier", today: "today", yesterday: "yesterday",
  howLive: "Open a decision · Approve / Reject saves it straight to the ledger",
  howStatic: "This is a read-only snapshot. Run wdd review to make rulings.",
  download: "Download as Markdown",
  saveFail: (e) => "Save failed: " + e,
  pinnedTo: (where) => "Saved as a rule in " + where + ":",
  uncommitted: "Saved to .wdd/ledger.jsonl on disk — but git can't track it because .wdd is gitignored. Remove the .wdd line from .gitignore to version it, or run <b>wdd share local</b> to keep it local-only.",
  empty: "no decisions in this scope",
  tabTimeline: "Timeline", tabThreads: "Threads",
  kbHint: '<kbd>j</kbd><kbd>k</kbd> move · <kbd>↵</kbd> open · <kbd>a</kbd>/<kbd>r</kbd> rule',
  threadMeta: (n, silent, walked) => n + " decision" + (n === 1 ? "" : "s") +
    (silent ? " · " + silent + " silent" : "") + (walked ? ' · <span class="warn">' + walked + " walked back</span>" : ""),
  threadOf: (label) => label, looseThread: "Unrelated / standalone",
  testLine: (k, p, f) => k + " · " + (p ?? 0) + " passed" + (f ? " · " + f + " failed" : ""),
  ruleHere: (root) => 'Read-only. Rule inside the repo: <code>cd ' + root + ' && wdd review</code>',
};

const cat = (e) => (e.aware ? "aware" : e.by === "agent" ? "silent" : "reflex");
const allEntries = () => state.repos.flatMap((r, ri) => r.entries.map((e) => ({ ...e, _ri: ri })));
const flatIndex = {}; // "ri:id" -> {entry, repo}
state.repos.forEach((r, ri) => r.entries.forEach((e) => (flatIndex[ri + ":" + e.id] = { e, r })));

/* theme */
const themeBtn = document.getElementById("theme");
function applyTheme() {
  const saved = localStorage.getItem("wdd:theme");
  if (saved) document.documentElement.setAttribute("data-theme", saved);
  else document.documentElement.removeAttribute("data-theme");
  const dark = saved ? saved === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
  themeBtn.textContent = dark ? "☀" : "☾";
}
themeBtn.onclick = () => {
  const dark = document.documentElement.getAttribute("data-theme") === "dark" ||
    (!localStorage.getItem("wdd:theme") && matchMedia("(prefers-color-scheme: dark)").matches);
  localStorage.setItem("wdd:theme", dark ? "light" : "dark");
  applyTheme();
};
applyTheme();

function updateBar() {
  const ex = document.getElementById("export");
  if (state.live) {
    // Rulings save immediately from the drawer; the bar just shows progress.
    const all = allEntries();
    const ruled = all.filter((e) => e.verdict).length;
    document.getElementById("staged").textContent = ruled + " / " + all.length + " reviewed";
    document.getElementById("staged").className = "";
    document.getElementById("how").textContent = T.howLive;
    ex.style.display = "none";
  } else {
    document.getElementById("staged").textContent = "";
    ex.style.display = "";
    ex.textContent = T.download; ex.disabled = false;
    document.getElementById("how").textContent = T.howStatic;
  }
}

function render() {
  document.getElementById("bar").style.display = "";
  document.getElementById("title").textContent = state.title;
  const entries = allEntries();
  const silent = entries.filter((e) => cat(e) === "silent").length;
  const pend = entries.filter((e) => !verdictOf(e)).length;
  const pass = state.repos.flatMap((r) => r.traces).reduce((s, x) => s + (x.pass || 0), 0);
  const fail = state.repos.flatMap((r) => r.traces).reduce((s, x) => s + (x.fail || 0), 0);
  const weak = state.repos.reduce((s, r) => s + (r.weakened ? r.weakened.length : 0), 0);
  document.getElementById("brief").innerHTML = T.brief(silent);
  document.getElementById("stats").innerHTML =
    (state.repos.length > 1 ? stat(state.repos.length, T.repos) : "") +
    stat(entries.length, T.decisions) +
    stat(pend, T.pending, pend > 0) +
    stat(silent, T.silent, silent > 0 && pend > 0) +
    (pass + fail ? stat(pass + " ✓" + (fail ? " " + fail + " ✗" : ""), T.tests, fail > 0) : "") +
    (weak > 0 ? stat(weak, T.weakened, true) : "");

  renderTriage();
  renderTabs();
  const root = document.getElementById("repos");
  root.textContent = "";
  if (view === "threads") state.repos.forEach((r, ri) => root.appendChild(threadsSection(r, ri)));
  else state.repos.forEach((r, ri) => root.appendChild(repoSection(r, ri)));
  selIndex = -1;
  updateBar();
}

let view = "timeline";
let filter = ""; // "" = all, else a category: silent | reflex | aware
function renderTabs() {
  const el = document.getElementById("tabs");
  const tab = (id, label) => '<button class="tab' + (view === id ? " on" : "") + '" data-view="' + id + '">' + esc(label) + "</button>";
  const ents = allEntries();
  const chip = (c, label) => {
    const n = c ? ents.filter((e) => cat(e) === c).length : ents.length;
    if (c && n === 0) return "";
    return '<button class="fchip ' + (c || "all") + (filter === c ? " on" : "") + '" data-f="' + c + '">' +
      (c ? "<i></i>" : "") + esc(label) + ' <b>' + n + "</b></button>";
  };
  el.innerHTML = tab("timeline", T.tabTimeline) + tab("threads", T.tabThreads) +
    '<span class="fsep"></span>' +
    chip("", T.filterAll) + chip("silent", T.tag.silent) + chip("reflex", T.tag.reflex) + chip("aware", T.tag.aware) +
    '<span class="kh">' + T.kbHint + "</span>";
  el.querySelectorAll(".tab").forEach((b) => (b.onclick = () => { view = b.dataset.view; render(); }));
  el.querySelectorAll(".fchip").forEach((b) => (b.onclick = () => { filter = b.dataset.f; render(); }));
}
const inFilter = (e) => !filter || cat(e) === filter;

// The higher-risk, still-pending decisions, ranked - so review starts where it matters.
function renderTriage() {
  const el = document.getElementById("triage");
  const ranked = allEntries()
    .filter((e) => !verdictOf(e) && e.risk && e.risk.level !== "low")
    .sort((a, b) => (b.risk.score || 0) - (a.risk.score || 0))
    .slice(0, 5);
  if (!ranked.length) { el.textContent = ""; return; }
  el.innerHTML = '<div class="triage"><div class="th">' + esc(T.triageHead(ranked.length)) + "</div><ol>" +
    ranked.map((e) => '<li data-key="' + e._ri + ":" + e.id + '">' + esc(e.id + " · " + e.what) +
      (e.risk.reasons.length ? ' <span class="rz">(' + esc(e.risk.reasons.join(" · ")) + ")</span>" : "") + "</li>").join("") +
    "</ol></div>";
  el.querySelectorAll("li[data-key]").forEach((li) => (li.onclick = () => openDrawer(li.dataset.key)));
}

function verdictOf(e) { return e.verdict; }
function stat(v, label, warn) { return '<div class="stat' + (warn ? " warn" : "") + '"><b>' + v + "</b>" + esc(label) + "</div>"; }

function repoSection(r, ri) {
  const sec = document.createElement("section");
  sec.className = "repo";
  if (state.repos.length > 1 || r.gate) {
    const pend = r.entries.filter((e) => !verdictOf({ ...e, _ri: ri })).length;
    sec.innerHTML = '<div class="repo-h"><span class="name">' + esc(r.repo) + "</span>" +
      (r.branch ? '<span class="chip">' + esc(r.branch) + "</span>" : "") +
      (r.gate ? '<span class="gate ' + (r.gate.green ? "green" : "red") + '">' + (r.gate.green ? "gate green" : "gate red") + "</span>" : "") +
      '<span class="mini">' + pend + " / " + r.entries.length + " pending</span></div>";
  }
  if (r.weakened && r.weakened.length) {
    sec.insertAdjacentHTML("beforeend", '<div class="warnstrip"><div class="wh">' + esc(T.weakenedHead) + "</div><ul>" +
      r.weakened.map((w) => "<li>" + esc(T.weakenedItem(w)) + "</li>").join("") + "</ul></div>");
  }
  const changes = changesHtml(r);
  if (changes) sec.insertAdjacentHTML("beforeend", changes);
  const items = [
    ...r.entries.filter(inFilter).map((e) => ({ type: "d", t: e.t, cwd: e.cwd, e: { ...e, _ri: ri } })),
    ...(filter ? [] : r.traces.map((tr) => ({ type: "t", t: tr.t, cwd: tr.cwd, tr }))),
  ];
  if (!items.length) { sec.insertAdjacentHTML("beforeend", '<div class="empty">' + T.empty + "</div>"); return sec; }
  const cwds = [...new Set(items.map((i) => i.cwd || r.root))].sort((a, b) => (a === r.root ? -1 : b === r.root ? 1 : a < b ? -1 : 1));
  for (const cwd of cwds) {
    const group = items.filter((i) => (i.cwd || r.root) === cwd).sort((a, b) => ((a.t || "") < (b.t || "") ? -1 : 1));
    const wt = document.createElement("div");
    wt.className = "wt";
    if (cwds.length > 1) wt.innerHTML = '<div class="wt-h">worktree <span class="path">' + esc(wtLabel(r, cwd)) + "</span></div>";
    const ol = document.createElement("ol");
    ol.className = "tl";
    let day = null, prevRef = null;
    for (const it of group) {
      const d = localDay(it.t);
      if (d !== day) { day = d; prevRef = null; const dh = document.createElement("div"); dh.className = "day"; dh.textContent = dayLabel(it.t); ol.appendChild(dh); }
      if (it.type === "d") {
        const cont = it.e.ref && it.e.ref === prevRef; // same session moment as the row above
        ol.appendChild(decisionRow(it, cont));
        prevRef = it.e.ref;
      } else { ol.appendChild(traceRow(it)); prevRef = null; }
    }
    wt.appendChild(ol);
    sec.appendChild(wt);
  }
  if (!state.interactive) sec.insertAdjacentHTML("beforeend", '<div class="ro">' + T.ruleHere(esc(r.root)) + "</div>");
  return sec;
}

function wtLabel(r, cwd) {
  if (!cwd || cwd === r.root) return r.repo;
  return cwd.startsWith(r.root) ? r.repo + cwd.slice(r.root.length) : cwd;
}

function traceRow(it) {
  const li = document.createElement("li");
  li.className = "item trace";
  const ok = it.tr.exit === 0;
  li.innerHTML = '<span class="t" title="' + esc(fullTime(it.t)) + '">' + hhmm(it.t) + '</span><span class="dot"></span>' +
    '<div class="trow"><span class="' + (ok ? "ok" : "bad") + '">' + (ok ? "✓" : "✗") + "</span>" +
    '<span class="tk">' + esc(T.testLine(it.tr.kind, it.tr.pass, it.tr.fail)) + "</span>" +
    '<span class="cmd" title="' + esc(it.tr.cmd) + '">' + esc(shortCmd(it.tr.cmd)) + "</span></div>";
  return li;
}

function decisionRow(it, cont) {
  const li = document.createElement("li");
  li.className = "item " + cat(it.e) + (cont ? " cont" : "");
  li.innerHTML = cont
    ? '<span class="t"></span><span class="dot sub"></span>'
    : '<span class="t" title="' + esc(fullTime(it.t)) + '">' + hhmm(it.t) + '</span><span class="dot"></span>';
  li.appendChild(decisionCard(it.e));
  return li;
}

// The clickable decision card, reused by the timeline and the threads view.
function decisionCard(e) {
  const c = cat(e);
  const verdict = verdictOf(e);
  const link = e.link || {};
  const level = !verdict && e.risk ? e.risk.level : "low";
  const btn = document.createElement("button");
  btn.className = "drow" + (verdict === "reject" ? " reject" : "") + (level === "high" ? " rh" : "");
  btn.dataset.key = e._ri + ":" + e.id;
  const meta = '<span class="meta"><span class="id">' + esc(e.id) + "</span>" +
    '<span class="tag ' + c + '"><i></i>' + esc(tagLabel(e, c)) + "</span></span>";
  const rel = [
    link.revisedBy ? '<span class="tlink back">↩ ' + esc(T.revisedBy(link.revisedBy)) + "</span>" : "",
    link.revises ? '<span class="tlink fwd">↪ ' + esc(T.revises(link.revises)) + "</span>" : "",
    e.pinned ? '<span class="v rule">rule</span>' : "",
    verdict ? '<span class="v ' + verdict + '">' + esc(T[verdict === "accept" ? "affirmed" : "overturned"]) + "</span>" : "",
  ].filter(Boolean).join("");
  btn.innerHTML = meta +
    '<span class="body"><span class="what">' + esc(e.what) + "</span>" +
    (rel ? '<span class="rel">' + rel + "</span>" : "") + "</span>" +
    '<span class="chev">›</span>';
  btn.onclick = () => openDrawer(btn.dataset.key);
  return btn;
}

/* ---- Threads view: group decisions that changed the same code into one story ---- */
const SECONDARY_JS = /(\.test\.|\.spec\.|_test\.|(^|[/])tests?[/]|\.md$|\.json$)/;
function overlapScore(a, b) {
  return (a || []).filter((f) => (b || []).includes(f)).reduce((s, f) => s + (SECONDARY_JS.test(f) ? 1 : 2), 0);
}
function buildThreads(entries) {
  const parent = entries.map((_, i) => i);
  const find = (x) => { while (parent[x] !== x) { parent[x] = parent[parent[x]]; x = parent[x]; } return x; };
  const union = (a, b) => { parent[find(a)] = find(b); };
  const idx = {}; entries.forEach((e, i) => (idx[e.id] = i));
  for (let i = 0; i < entries.length; i++) {
    const lk = entries[i].link;
    if (lk && lk.revises != null && idx[lk.revises] != null) union(i, idx[lk.revises]);
    if (lk && lk.revisedBy != null && idx[lk.revisedBy] != null) union(i, idx[lk.revisedBy]);
    for (let j = i + 1; j < entries.length; j++)
      if (overlapScore(entries[i].files, entries[j].files) >= 2) union(i, j);
  }
  const g = {}; entries.forEach((e, i) => { const k = find(i); (g[k] = g[k] || []).push(e); });
  return Object.values(g).map((ds) => ds.slice().sort((a, b) => (a.t || "").localeCompare(b.t || "")));
}
function threadLabel(ds) {
  const freq = {}; // dominant file names the thread; source files weigh more than tests/config
  for (const d of ds) for (const f of d.files || []) freq[f] = (freq[f] || 0) + (SECONDARY_JS.test(f) ? 1 : 3);
  const top = Object.keys(freq).sort((a, b) => freq[b] - freq[a])[0];
  if (top) return top.split("/").pop();
  const w = (ds[0] && ds[0].what) || "";
  return w.length > 44 ? w.slice(0, 44).replace(/\s+\S*$/, "") + "…" : w;
}
function threadMaxRisk(ds) { return Math.max(0, ...ds.map((d) => (d.risk && !d.verdict ? d.risk.score : 0))); }

function threadsSection(r, ri) {
  const sec = document.createElement("section");
  sec.className = "repo";
  const entries = r.entries.filter(inFilter).map((e) => ({ ...e, _ri: ri }));
  if (!entries.length) { sec.innerHTML = '<div class="empty">' + T.empty + "</div>"; return sec; }
  const groups = buildThreads(entries);
  const threads = groups.filter((g) => g.length > 1).sort((a, b) => threadMaxRisk(b) - threadMaxRisk(a));
  const singles = groups.filter((g) => g.length === 1).flat().sort((a, b) => (a.t || "").localeCompare(b.t || ""));
  for (const ds of threads) sec.appendChild(threadGroup(threadLabel(ds), ds, threadMaxRisk(ds) >= 60));
  if (singles.length) sec.appendChild(threadGroup(T.looseThread, singles, false));
  if (!state.interactive) sec.insertAdjacentHTML("beforeend", '<div class="ro">' + T.ruleHere(esc(r.root)) + "</div>");
  return sec;
}
function threadGroup(name, ds, open) {
  const d = document.createElement("details");
  d.className = "thread"; if (open) d.open = true;
  const silent = ds.filter((e) => cat(e) === "silent").length;
  const walked = ds.filter((e) => e.link && e.link.revisedBy).length;
  const sum = document.createElement("summary");
  sum.innerHTML = '<span class="tname">' + esc(name) + '</span><span class="tmeta">' + T.threadMeta(ds.length, silent, walked) + "</span>";
  d.appendChild(sum);
  const body = document.createElement("div"); body.className = "tbody";
  for (const e of ds) body.appendChild(decisionCard(e));
  d.appendChild(body);
  return d;
}

function tagLabel(e, c) {
  if (c === "reflex" && e.latencyMs != null && e.latencyMs < 10000) return T.stampedFast((e.latencyMs / 1000).toFixed(1));
  if (c === "aware" && e.by === "agent") return T.tagConfirmed; // AI's choice you signed off on - not "you decided"
  return T.tag[c];
}

/* drawer */
const scrim = document.getElementById("scrim");
const drawer = document.getElementById("drawer");
let openKey = null;
function openDrawer(key) {
  openKey = key;
  drawer.innerHTML = drawerHtml(key);
  wireDrawer(key);
  scrim.classList.add("open");
  drawer.classList.add("open");
  drawer.setAttribute("aria-hidden", "false");
}
function closeDrawer() {
  openKey = null;
  scrim.classList.remove("open");
  drawer.classList.remove("open");
  drawer.setAttribute("aria-hidden", "true");
}
scrim.onclick = closeDrawer;

/* keyboard review: j/k move · Enter open · a/r rule the selected/open decision · Esc close */
let selIndex = -1;
function visibleRows() { return [...document.querySelectorAll("#repos .drow")]; }
function selectRow(i) {
  const rs = visibleRows(); if (!rs.length) return;
  selIndex = Math.max(0, Math.min(i, rs.length - 1));
  rs.forEach((b, k) => b.classList.toggle("sel", k === selIndex));
  rs[selIndex].scrollIntoView({ block: "nearest" });
}
addEventListener("keydown", (ev) => {
  if (ev.key === "Escape") return closeDrawer();
  const t = (ev.target.tagName || "").toLowerCase();
  if (t === "input" || t === "textarea" || ev.metaKey || ev.ctrlKey) return;
  const open = drawer.classList.contains("open");
  if (ev.key === "j" || ev.key === "ArrowDown") { ev.preventDefault(); selectRow(selIndex + 1); }
  else if (ev.key === "k" || ev.key === "ArrowUp") { ev.preventDefault(); selectRow(selIndex <= 0 ? 0 : selIndex - 1); }
  else if (ev.key === "Enter" || ev.key === "o") { const b = visibleRows()[selIndex]; if (b) { ev.preventDefault(); b.click(); } }
  else if (ev.key === "a" || ev.key === "r") {
    if (!state.interactive) return;
    const key = open ? openKey : (visibleRows()[selIndex] || {}).dataset && visibleRows()[selIndex].dataset.key;
    if (key) { ev.preventDefault(); rule(key, ev.key === "a" ? "accept" : "reject"); }
  }
});

function drawerHtml(key) {
  const { e, r } = flatIndex[key];
  const verdict = e.verdict;
  const ri = key.split(":")[0];
  let body = "";

  // "Needs attention" - ONLY negative/actionable signals. Green facts stay out
  // of the way; a clean decision gets a short drawer.
  const attn = [];
  if (!verdict && e.risk && e.risk.level !== "low")
    for (const reason of e.risk.reasons) attn.push("<li>" + esc(reason) + "</li>");
  if (e.coverage === "none" || e.coverage === "red")
    attn.push('<li class="hard">' + esc(T.covLabel[e.coverage]) + "</li>");
  if (e.link && (e.link.revisedBy || e.link.revises)) {
    const otherId = e.link.revisedBy || e.link.revises;
    const other = flatIndex[ri + ":" + otherId] && flatIndex[ri + ":" + otherId].e;
    const gist = other && other.what.length > 40 ? other.what.slice(0, 40) + "…" : other ? other.what : "";
    attn.push('<li class="hard"><button class="alink" data-key="' + ri + ":" + otherId + '">' +
      esc((e.link.revisedBy ? "↩ " + T.revisedBy(otherId) : "↪ " + T.revises(otherId)) + (gist ? " — " + gist : "")) + " ›</button></li>");
  }
  if (attn.length)
    body += '<div class="attn ' + (!verdict && e.risk && e.risk.level === "high" ? "hi" : "md") + '">' +
      '<div class="ah">' + esc(T.attnHead) + "</div><ul>" + attn.join("") + "</ul></div>";

  if (e.why) body += sec(T.why, esc(e.why));

  // Everything else folds away until asked for.
  const diffBlocks = diffHtml(e.files || [], r);
  if (e.files && e.files.length)
    body += fold(T.diff + " · " + e.files.length + " file" + (e.files.length === 1 ? "" : "s"),
      '<div class="files">' + e.files.map((f) => "<code>" + esc(relPath(f, r.root)) + "</code>").join("") + "</div>" + diffBlocks);
  if (e.alternatives && e.alternatives.length)
    body += fold(T.alts + " · " + e.alternatives.length,
      '<div class="alts">' + e.alternatives.map((a) => "<span>" + esc(a) + "</span>").join("") + "</div>");
  const slice = r.slices[e.ref];
  body += fold(T.excerpt,
    (slice ? '<div class="excerpt">' + excerptHtml(slice) + "</div>" : '<span style="color:var(--muted);font-size:12.5px">' + esc(T.noExcerpt) + "</span>") +
    '<div class="refline">' + esc(e.ref) + (e.branch ? " · " + esc(e.branch) : "") + "</div>");
  body += fold(T.attrs, '<span class="quad">' +
    "<b class=" + (e.by === "agent" ? "bad" : "ok") + ">" + esc(e.by === "agent" ? T.byAgent : T.byUser) + "</b> · " +
    "<b class=" + (e.aware ? "ok" : "bad") + ">" + esc(e.aware ? T.awareYes : T.awareNo) + "</b>" +
    (e.model ? ' · <span class="mono">' + esc(e.model) + "</span>" : "") +
    (e.reversibility ? " · " + esc(T.rev[e.reversibility]) : "") +
    (e.coverage === "green" ? ' · <b class="ok">' + esc(T.covLabel.green) + "</b>" : "") + "</span>");

  let footer = "";
  if (!state.interactive) {
    footer = '<div class="ro">' + T.ruleHere(esc(r.root)) + "</div>";
  } else {
    // Order (bottom-up): rule switch, then note, then the ruling buttons.
    // Clicking Approve/Reject IS the save (immediate). No separate Save step.
    footer =
      '<label class="ruleswitch"><input type="checkbox" id="ruleSw"' + (e.pinned ? " checked" : "") + ">" +
      "<span>" + T.remember + "</span></label>" +
      '<div class="rulehint" id="ruleHint">' + (e.pinned ? T.ruleOnHint(memoryLabel()) : "") + "</div>" +
      '<textarea class="note" placeholder="' + esc(T.note) + '">' + esc(e.ruleNote || "") + "</textarea>" +
      '<div class="next">' + T.explain + "</div>" +
      '<div class="btns"><button class="ok' + (verdict === "accept" ? " on" : "") + '" data-v="accept">' + T.affirm + "</button>" +
      '<button class="no' + (verdict === "reject" ? " on" : "") + '" data-v="reject">' + T.overturn + "</button></div>";
  }
  const c = cat(e);
  return (
    '<div class="dh"><div><div class="id">' + esc(e.id) + " · " +
    '<span class="tag ' + c + '" style="padding:2px 7px"><i></i>' + esc(tagLabel(e, c)) + "</span></div>" +
    "<h2>" + esc(e.what) + '</h2></div><button class="x" title="close">×</button></div>' +
    '<div class="dbody">' + body + "</div>" +
    '<div class="df">' + footer + "</div>"
  );
}

function memoryLabel() {
  return state.memory && state.memory.length ? state.memory.join(", ") : "your agent memory file";
}

function wireDrawer(key) {
  drawer.querySelector(".x").onclick = closeDrawer;
  drawer.querySelectorAll(".alink").forEach((a) => (a.onclick = () => openDrawer(a.dataset.key)));
  const noteEl = drawer.querySelector(".note");
  const sw = drawer.querySelector("#ruleSw");
  if (sw) sw.onchange = () => {
    const h = drawer.querySelector("#ruleHint");
    if (h) h.innerHTML = sw.checked ? T.ruleOnHint(memoryLabel()) : "";
  };
  drawer.querySelectorAll(".btns button").forEach((b) => (b.onclick = () => rule(key, b.dataset.v)));
}

/** A ruling is immediate: Approve/Reject POSTs straight to the ledger.
 *  If "save as a rule" is on, confirm first (it writes to agent memory). */
async function rule(key, verdict) {
  const { e } = flatIndex[key];
  const noteEl = drawer.querySelector(".note");
  const sw = drawer.querySelector("#ruleSw");
  const note = (noteEl && noteEl.value.trim()) || undefined;
  const pin = !!(sw && sw.checked);
  if (pin && !(await confirmModal(T.confirmRule(verdict, memoryLabel(), e.what, note)))) return;
  const op = { op: "ratify", target: key.split(":")[1], verdict, ...(note ? { note } : {}), ...(pin ? { pin: true } : {}) };
  try {
    const res = await fetch("/apply", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify([op]) });
    const r = await res.json();
    if (r.error) return banner(esc(T.saveFail(r.error)), "err");
    e.verdict = verdict; e.ruleNote = note; e.pinned = pin;
    drawer.innerHTML = drawerHtml(key); wireDrawer(key);
    render();
    if (r.uncommitted) return banner(T.uncommitted, "warn");
    // Report the SERVER's truth: which files it actually wrote.
    const wrote = (r.synced || []).filter((f) => !f.startsWith(".wdd"));
    let msg = "<b>" + esc(e.id + " " + (verdict === "accept" ? T.affirmed : T.overturned)) + "</b>";
    if (pin && wrote.length) {
      msg += "<div class=\"bpin\">" + esc(T.pinnedTo(wrote.join(", "))) + "<ul><li>" +
        (verdict === "reject" ? "DON'T " : "DO ") + esc(e.what) + (note ? " — " + esc(note) : "") + "</li></ul></div>";
    } else if (pin) {
      // Asked to save as a rule, but no memory file was written.
      return banner(esc(T.pinNoTarget), "warn");
    }
    banner(msg, "ok");
  } catch (err) {
    banner(esc(T.saveFail(err)), "err");
  }
}

/* time — ledger stores UTC; render in the viewer's local zone via Date */
function hhmm(iso) { if (!iso) return ""; const d = new Date(iso); return isNaN(d) ? "" : d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", hour12: false }); }
function localDay(iso) { if (!iso) return null; const d = new Date(iso); return isNaN(d) ? null : d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0"); }
function dayLabel(iso) {
  const day = localDay(iso); if (!day) return T.earlier;
  const today = localDay(new Date().toISOString()), yst = localDay(new Date(Date.now() - 86400000).toISOString());
  return day + (day === today ? " · " + T.today : day === yst ? " · " + T.yesterday : "");
}
function fullTime(iso) { if (!iso) return ""; const d = new Date(iso); return isNaN(d) ? "" : d.toLocaleString("en-US", { dateStyle: "medium", timeStyle: "long" }); }
// Drop the leading "cd <path> " so the useful command (the test runner) leads; full text stays in the title.
function shortCmd(cmd) { return (cmd || "").replace(/^cd \S+\s+/, ""); }

// Repo-level change map: every file the branch touched, each expandable to its diff.
function changesHtml(r) {
  const files = r.diffs ? Object.keys(r.diffs) : [];
  if (!files.length) return "";
  let add = 0, del = 0;
  for (const f of files) { add += r.diffs[f].added; del += r.diffs[f].deleted; }
  const rows = files.sort().map((f) => {
    const d = r.diffs[f];
    return '<details class="diff"><summary><span>' + esc(f) + "</span>" +
      '<span class="churn"><span class="a">+' + d.added + '</span> <span class="d">-' + d.deleted + "</span></span></summary>" +
      '<pre class="patch">' + patchLines(d.patch) + "</pre></details>";
  }).join("");
  return '<details class="changes"><summary>' + T.changesHead(files.length, add, del) + "</summary>" +
    '<div class="chmap">' + rows + "</div></details>";
}

// Render the actual branch diff for a decision's files (collapsed per file).
function diffHtml(files, r) {
  if (!r.diffs) return "";
  let out = "";
  for (const f of files) {
    const d = r.diffs[relPath(f, r.root)] || r.diffs[f];
    if (!d) continue;
    out += '<details class="diff"><summary><span>' + esc(relPath(f, r.root)) + "</span>" +
      '<span class="churn"><span class="a">+' + d.added + '</span> <span class="d">-' + d.deleted + "</span></span></summary>" +
      '<pre class="patch">' + patchLines(d.patch) + "</pre></details>";
  }
  return out;
}
function patchLines(patch) {
  return patch.split("\n")
    .filter((l) => !/^(diff --git|index |--- |\+\+\+ |new file|deleted file|old mode|new mode|similarity|rename )/.test(l))
    .map((l) => {
      const cls = l[0] === "+" ? "da" : l[0] === "-" ? "dd" : l.slice(0, 2) === "@@" ? "dc" : "";
      return '<span class="l ' + cls + '">' + (esc(l) || " ") + "</span>";
    }).join("");
}

// In-page banner (no system alert). kind: ok | warn | err. HTML content allowed.
let bannerTimer;
function banner(html, kind) {
  const el = document.getElementById("banner");
  el.className = "show " + (kind || "ok");
  el.innerHTML = '<div class="bx">' + html + '</div><button class="bxc">×</button>';
  el.querySelector(".bxc").onclick = () => el.classList.remove("show");
  clearTimeout(bannerTimer);
  if (kind === "ok") bannerTimer = setTimeout(() => el.classList.remove("show"), 5000);
}

function relPath(f, root) { return root && f.indexOf(root) === 0 ? f.slice(root.length).replace(/^[/]/, "") : f; }
function sec(label, body) { return '<div class="sec"><div class="lbl">' + esc(label) + "</div>" + body + "</div>"; }
// Collapsed-by-default drawer section: one quiet line until the reviewer asks.
function fold(label, body) { return '<details class="dsec"><summary>' + esc(label) + "</summary><div class=\"dsx\">" + body + "</div></details>"; }
function excerptHtml(slice) { return slice.split("\n").map((l) => (/\] (USER|USER-[A-Z-]+):/.test(l) ? '<span class="u">' + esc(l) + "</span>" : esc(l))).join("\n"); }

// Static snapshot: the only footer action is downloading a readable record.
document.getElementById("export").onclick = () => downloadMarkdown();

/** In-page confirm (no system dialog). Returns a Promise<boolean>. */
function confirmModal(msg) {
  return new Promise((resolve) => {
    const m = document.getElementById("modal");
    m.innerHTML =
      '<div class="mbox"><div class="mmsg">' + msg + "</div>" +
      '<div class="mbtns"><button class="mc">' + T.cancel + '</button><button class="mok">' + T.confirm + "</button></div></div>";
    m.className = "show";
    const done = (v) => { m.className = ""; resolve(v); };
    m.querySelector(".mc").onclick = () => done(false);
    m.querySelector(".mok").onclick = () => done(true);
    m.onclick = (ev) => { if (ev.target === m) done(false); };
  });
}

/** Read-only snapshot download: a plain, human-readable Markdown record. */
function downloadMarkdown() {
  const md = ["# " + state.title, "", "Decision audit from whodecided.", ""];
  for (const r of state.repos) {
    if (state.repos.length > 1) md.push("## " + r.repo + (r.branch ? " · " + r.branch : ""), "");
    const line = (e) => {
      const v = e.verdict;
      const mark = v === "accept" ? "[approved]" : v === "reject" ? "[rejected]" : "[to review]";
      const who = e.aware ? "you decided" : e.by === "agent" ? "AI decided" : "you didn't read";
      const alt = e.alternatives && e.alternatives.length ? "  \n  vs " + e.alternatives.join(", ") : "";
      const why = e.why ? "  \n  why: " + e.why : "";
      return "- " + mark + " (" + who + ") " + e.what + alt + why;
    };
    for (const e of r.entries) md.push(line(e));
    md.push("");
  }
  const blob = new Blob([md.join("\n")], { type: "text/markdown" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "wdd-" + state.title.replace(/[^a-zA-Z0-9]+/g, "-") + ".md";
  document.body.appendChild(a); // detached anchors lose the download attribute in some browsers
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
}

function esc(s) { const d = document.createElement("div"); d.textContent = s == null ? "" : s; return d.innerHTML; }
render();
</script>
</body>
</html>
